appId: com.soleinnovations.fitbull
tags:
  - smoke
---
# Top-level smoke test: a fresh, wiped install launches and lands signed-out on
# the sign-up screen. `signup-siwa-button` is the deterministic anchor there
# (the auth-guard routes signed-out users to /(auth)/sign-up).

- runFlow: common/launch-app.yaml

- extendedWaitUntil:
    visible:
      id: "signup-siwa-button"
    timeout: 20000

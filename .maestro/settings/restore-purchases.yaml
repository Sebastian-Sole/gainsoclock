appId: com.soleinnovations.fitbull
tags:
  - settings
  - paywall
---
# Restore Purchases (Apple-required affordance) against the shipped settings
# screen. Settings is opened via the gear button in the Workouts header (it is
# not a tab bar item). Restore invokes RevenueCat; on the simulator with no
# StoreKit config it surfaces an alert. We treat any native sheet/alert as an
# optional-tap zone and assert we remain on the Settings screen.
#
# Prereq: reach /(tabs) by completing onboarding.

- runFlow: ../onboarding/01-happy-path.yaml

# Open settings from the Workouts header.
- tapOn:
    id: "tab-workouts"
- tapOn:
    id: "open-settings"

# Scroll the restore row into view and tap it.
- scrollUntilVisible:
    element:
      id: "settings-restore-purchases"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "settings-restore-purchases"

# RevenueCat may surface a native alert (e.g. "no purchases to restore" / "OK").
# Dismiss it if present; never fail on its absence.
- runFlow:
    when:
      visible:
        text: "OK"
    commands:
      - tapOn:
          text: "OK"

# We never left the Settings screen.
- assertVisible:
    text: "Settings"
    timeout: 10000

appId: com.soleinnovations.fitbull
---
# Reusable email sign-up step. Imported via `runFlow: common/sign-up-email.yaml`.
#
# A fresh, wiped install (see common/launch-app.yaml) lands signed-out on
# /(auth)/sign-up — the auth-guard routes signed-out users there. We create a
# brand-new account with the email/password passed via -e EMAIL / -e PASSWORD.
#
# All four handles exist as real testIDs (no optional-tap fallbacks needed):
#   signup-email-input / signup-password-input / signup-confirm-input / signup-submit
#
# Run with:
#   maestro test -e EMAIL=qa+run@example.com -e PASSWORD=hunter2hunter2 .maestro/...

- extendedWaitUntil:
    visible:
      id: "signup-submit"
    timeout: 15000

- tapOn:
    id: "signup-email-input"
- inputText: ${EMAIL}

# The password field uses textContentType="newPassword" (correct app behaviour:
# it enables Keychain save). On the simulator, focusing it pops iOS's "Use Strong
# Password?" sheet — a SpringBoard system layer that is NOT in the app's a11y
# tree, so it can't be matched by id/text. Focus the field, let the sheet animate
# in, then dismiss it by tapping its Close (X) by position before typing. The
# sheet only appears on the first newPassword focus, so the confirm field below
# needs no dismissal. Coordinates target the iPhone 17 Pro Max sheet X (~92%/61%).
- tapOn:
    id: "signup-password-input"
- waitForAnimationToEnd:
    timeout: 2500
- tapOn:
    point: "92%,61%"
- inputText: ${PASSWORD}

- tapOn:
    id: "signup-confirm-input"
- inputText: ${PASSWORD}

# Maestro 2.4.0 can't hideKeyboard on a raw secureTextEntry field, so dismiss it
# by tapping the non-interactive "or" divider (keeps the submit button reachable).
- tapOn:
    text: "or"

- tapOn:
    id: "signup-submit"

# Auth-guard routes the new (unfinished) account into onboarding.
- extendedWaitUntil:
    visible:
      id: "onboarding-welcome-continue"
    timeout: 20000

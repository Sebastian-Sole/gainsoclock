appId: com.soleinnovations.fitbull
tags:
  - onboarding
  - a11y
  - ship-gate
---
# Flow 08 — Reduce Motion happy path.
#
# Preconditions:
#   - Enable Reduce Motion on the simulator:
#       Settings → Accessibility → Motion → Reduce Motion → On
#   - Run:
#       xcrun simctl ui booted appearance dark   (optional, to cross-check)
#
# Assertion: every onboarding screen is usable without animation. Narrated
# lines (S7) render statically, aha carousel (S8) does not autoplay, progress
# dots update without animation.

- runFlow: ../common/launch-app.yaml
- runFlow: ./common-signed-in.yaml
- runFlow: ./common-pass-goal-experience-days.yaml
- tapOn:
    id: "onboarding-healthkit-dismiss"

- tapOn:
    id: "onboarding-manual-age"
- inputText: "30"
- pressKey: Enter
- tapOn:
    id: "onboarding-manual-weight"
- inputText: "75"
- pressKey: Enter
- tapOn:
    id: "onboarding-manual-height"
- inputText: "180"
- pressKey: Enter
- tapOn:
    id: "onboarding-manual-continue"

- tapOn:
    id: "consent-checkbox-analytics"
- tapOn:
    id: "onboarding-consent-submit"

# Aha tiles present without motion-dependent entry animations
- assertVisible:
    id: "aha-tile-calorie"
    timeout: 20000
- assertVisible:
    id: "aha-tile-schedule"
- assertVisible:
    id: "aha-tile-summary"
- tapOn:
    id: "onboarding-aha-continue"

appId: com.soleinnovations.fitbull
tags:
  - canary
  - weekly
---
# Flow 99 — Canary Walker (Offline-Sync #8 / Theme K).
#
# Weekly CI run. Exercises the ship-critical happy path and asserts that the
# expected analytics event chain has been observed for the canary user in
# the last 24h (tolerance ±10%, per plan-10 risk mitigation).
#
# Chain:
#   intake_started → consent_granted → plan_visible → trial_started
#
# The event-emission assertion is a follow-up PostHog REST query executed
# by `.github/workflows/canary-walker.yml` after this flow completes. This
# YAML only drives the UI walk; the workflow fails if PostHog query fails.

- runFlow: ../common/launch-app.yaml
- runFlow: ./common-signed-in.yaml
- runFlow: ./common-pass-goal-experience-days.yaml
- tapOn:
    id: "onboarding-healthkit-dismiss"

- tapOn:
    id: "onboarding-manual-age"
- inputText: "30"
- pressKey: Enter
- tapOn:
    id: "onboarding-manual-weight"
- inputText: "75"
- pressKey: Enter
- tapOn:
    id: "onboarding-manual-height"
- inputText: "180"
- pressKey: Enter
- tapOn:
    id: "onboarding-manual-continue"

- tapOn:
    id: "consent-checkbox-analytics"
- tapOn:
    id: "onboarding-consent-submit"

- assertVisible:
    id: "aha-tile-calorie"
    timeout: 20000
- tapOn:
    id: "onboarding-aha-continue"

- assertVisible:
    id: "paywall-screen"
- tapOn:
    id: "paywall-close"

- assertVisible:
    id: "tab-bar"
    timeout: 10000

appId: com.soleinnovations.fitbull
tags:
  - onboarding
  - critical-path
  - ship-gate
---
# Flow 04 — Intake with HealthKit grant → prefill path.
# S5 primer → grant → S5a healthkit-prefill (confirm) → S6 consent.
# Requires HealthKit permission on the simulator. If permission is already
# denied at OS-level, this flow is skipped via `--exclude-tags sim-skip`.

- runFlow: ../common/launch-app.yaml
- runFlow: ./common-signed-in.yaml
- runFlow: ./common-pass-goal-experience-days.yaml

# S5 primer → tap grant
- tapOn:
    id: "onboarding-healthkit-grant"

# iOS HealthKit sheet. Tap through (real device / authorized sim only).
- tapOn:
    text: "Turn On All"
    optional: true
- tapOn:
    text: "Allow"
    optional: true

# S5a prefill — values populated from HealthKit
- assertVisible:
    id: "onboarding-prefill-age"
- assertVisible:
    id: "onboarding-prefill-weight"
- assertVisible:
    id: "onboarding-prefill-height"
- tapOn:
    id: "onboarding-prefill-continue"

# S6 consent visible
- assertVisible:
    id: "consent-row-analytics"

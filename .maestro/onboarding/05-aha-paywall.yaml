appId: com.soleinnovations.fitbull
tags:
  - onboarding
  - critical-path
  - ship-gate
  - paywall
---
# Flow 05 — Aha reveal → paywall interstitial → restore affordance.
# Exercises S8 (aha plan reveal) → S11 (paywall).
# Requires a sandbox Apple ID on the simulator for full paywall; without one,
# the paywall still renders but purchase tap will fail — we only assert presence.

- runFlow: ../common/launch-app.yaml
- runFlow: ./common-signed-in.yaml
- runFlow: ./common-pass-goal-experience-days.yaml
- tapOn:
    id: "onboarding-healthkit-dismiss"

# S5b manual-stats
- tapOn:
    id: "onboarding-manual-age"
- inputText: "28"
- pressKey: Enter
- tapOn:
    id: "onboarding-manual-weight"
- inputText: "72"
- pressKey: Enter
- tapOn:
    id: "onboarding-manual-height"
- inputText: "175"
- pressKey: Enter
- tapOn:
    id: "onboarding-manual-continue"

# S6 consent
- tapOn:
    id: "consent-checkbox-analytics"
- tapOn:
    id: "onboarding-consent-submit"

# S7 analysis → S8 aha
- assertVisible:
    id: "aha-tile-calorie"
    timeout: 20000
- assertVisible:
    id: "aha-tile-schedule"
- assertVisible:
    id: "aha-tile-summary"

# Summary chips carry intake values (verifies pass-through, not exact values)
- assertVisible:
    id: "aha-chip-goal"
- assertVisible:
    id: "aha-chip-experience"
- assertVisible:
    id: "aha-chip-days"
- assertVisible:
    id: "aha-chip-stats"

# Continue → paywall
- tapOn:
    id: "onboarding-aha-continue"

# Paywall surface — restore affordance is a ship requirement (App Review)
- assertVisible:
    id: "paywall-screen"
- assertVisible:
    id: "paywall-restore"

# Close path — users MUST be able to dismiss
- tapOn:
    id: "paywall-close"

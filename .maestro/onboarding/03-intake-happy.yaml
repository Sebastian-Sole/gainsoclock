appId: com.soleinnovations.fitbull
tags:
  - onboarding
  - critical-path
  - ship-gate
---
# Flow 03 — Intake happy path end-to-end without HealthKit grant.
# S2 goal → S3 experience → S4 days → S5 primer (dismiss) → S5b manual-stats
# → S6 consent → S7 analysis loader.

- runFlow: ../common/launch-app.yaml
- runFlow: ./common-signed-in.yaml

# S2 goal
- assertVisible:
    id: "onboarding-goal-continue"
- tapOn:
    id: "goal-card-build_muscle"
- tapOn:
    id: "onboarding-goal-continue"

# S3 experience
- tapOn:
    id: "experience-chip-intermediate"
- tapOn:
    id: "onboarding-goal-continue"
    optional: true

# S4 days
- tapOn:
    id: "day-chip-monday"
- tapOn:
    id: "day-chip-wednesday"
- tapOn:
    id: "day-chip-friday"
- tapOn:
    id: "onboarding-days-continue"

# S5 primer — dismiss
- tapOn:
    id: "onboarding-healthkit-dismiss"

# S5b manual-stats
- tapOn:
    id: "onboarding-manual-age"
- inputText: "32"
- pressKey: Enter
- tapOn:
    id: "onboarding-manual-weight"
- inputText: "80"
- pressKey: Enter
- tapOn:
    id: "onboarding-manual-height"
- inputText: "182"
- pressKey: Enter
- tapOn:
    id: "onboarding-manual-continue"

# S6 consent
- tapOn:
    id: "consent-checkbox-analytics"
- tapOn:
    id: "consent-checkbox-aiCoach"
    optional: true
- tapOn:
    id: "onboarding-consent-submit"

# S7 analysis loader visible
- assertVisible:
    id: "onboarding-progress-dots"

appId: com.soleinnovations.fitbull
---
# Reusable: walk through S2/S3/S4 with a default selection set,
# ending on S5 HealthKit primer visible.

# S2 goal
- tapOn:
    id: "goal-card-build_muscle"
- tapOn:
    id: "onboarding-goal-continue"

# S3 experience
- tapOn:
    id: "experience-chip-intermediate"
- tapOn:
    id: "onboarding-goal-continue"
    optional: true

# S4 days
- tapOn:
    id: "day-chip-monday"
- tapOn:
    id: "day-chip-wednesday"
- tapOn:
    id: "day-chip-friday"
- tapOn:
    id: "onboarding-days-continue"

# S5 primer now visible
- assertVisible:
    id: "healthkit-primer-section-read"

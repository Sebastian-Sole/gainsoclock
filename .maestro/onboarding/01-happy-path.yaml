appId: com.soleinnovations.fitbull
tags:
  - onboarding
---
# Onboarding happy path against the SHIPPED sequence:
#   sign-up -> welcome -> demo-chat -> demo-meals -> demo-workouts
#   -> founder-note -> healthkit -> paywall -> /(tabs)
#
# The paywall is a SOFT paywall: it presents the native RevenueCat sheet and
# every outcome (purchase, dismiss, RC unavailable) lands on /(tabs). The native
# sheet is an optional-tap zone — we never assert inside it. Landing anchor is
# `tab-workouts` (the first /(tabs) screen; settings is reached via a header
# button, not a tab bar item).

- runFlow: ../common/launch-app.yaml
- runFlow: ../common/sign-up-email.yaml

# Welcome
- tapOn:
    id: "onboarding-welcome-continue"
- waitForAnimationToEnd:
    timeout: 3000

# Demo: chat
- tapOn:
    id: "demo-chat-continue"
- waitForAnimationToEnd:
    timeout: 3000

# Demo: meals
- tapOn:
    id: "demo-meals-continue"
- waitForAnimationToEnd:
    timeout: 3000

# Demo: workouts
- tapOn:
    id: "demo-workouts-continue"
- waitForAnimationToEnd:
    timeout: 3000

# Founder note
- tapOn:
    id: "founder-note-continue"
- waitForAnimationToEnd:
    timeout: 3000

# HealthKit primer -> Continue triggers the system HealthKit prompt (iOS).
# We always advance whatever the user decides; the native permission dialog is
# an optional-tap zone.
- tapOn:
    id: "onboarding-healthkit-continue"
- runFlow:
    when:
      visible:
        text: "Don.t Allow"
    commands:
      - tapOn:
          text: "Don.t Allow"
- waitForAnimationToEnd:
    timeout: 5000

# Soft paywall. With no RevenueCat offerings configured (dev/CI), this is the
# in-app interstitial (or fallback) screen, not a native RC sheet; tap its skip
# ("I'll decide later"). If a native RC sheet ever appears instead, its Close is
# an optional-tap zone. Any outcome lands on /(tabs).
- tapOn:
    id: "paywall-skip"
    optional: true
- tapOn:
    id: "paywall-fallback-skip"
    optional: true
- runFlow:
    when:
      visible:
        text: "Close"
    commands:
      - tapOn:
          text: "Close"

# Soft paywall always lands on /(tabs).
- extendedWaitUntil:
    visible:
      id: "tab-workouts"
    timeout: 30000

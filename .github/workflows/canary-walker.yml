name: Canary Walker

on:
  schedule:
    # Every Monday 07:00 UTC (09:00 Oslo).
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: canary-walker
  cancel-in-progress: false

jobs:
  canary:
    name: 99-canary onboarding flow
    runs-on: macos-14
    timeout-minutes: 45
    env:
      MAESTRO_APP_ID: com.soleinnovations.fitbull
      CANARY_EMAIL: ${{ secrets.CANARY_EMAIL }}
      CANARY_PASSWORD: ${{ secrets.CANARY_PASSWORD }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
      POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
      POSTHOG_HOST: ${{ secrets.POSTHOG_HOST || 'https://eu.posthog.com' }}
      CANARY_DISTINCT_ID: ${{ secrets.CANARY_DISTINCT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Flow-id drift tripwire (fails in seconds, before the 40-min build)
        run: node scripts/check-maestro-ids.mjs

      - name: Install Maestro
        # Pin the CLI: the previous unpinned `latest` curl was a reproducibility
        # hole. Bump deliberately (see https://github.com/mobile-dev-inc/maestro/releases).
        env:
          MAESTRO_VERSION: "2.6.1"
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Install Facebook IDB
        run: |
          brew tap facebook/fb
          brew install facebook/fb/idb-companion

      - name: Boot simulator
        run: |
          xcrun simctl boot "iPhone 15" || true
          xcrun simctl list devices booted

      - name: Generate native iOS project
        run: pnpm exec expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: "1"

      - name: Build dev client for simulator
        # Compiles the .app the install step expects. derivedDataPath is
        # `ios/build`, so the product lands at
        # ios/build/Build/Products/Debug-iphonesimulator/Fitbull.app — the exact
        # path the next step installs. Scheme/workspace verified from the
        # committed ios/ project (scheme: Fitbull, workspace: Fitbull.xcworkspace).
        run: |
          xcodebuild -workspace ios/Fitbull.xcworkspace -scheme Fitbull \
            -configuration Debug -sdk iphonesimulator \
            -derivedDataPath ios/build CODE_SIGNING_ALLOWED=NO build

      - name: Install dev client on simulator
        run: |
          xcrun simctl install booted "ios/build/Build/Products/Debug-iphonesimulator/Fitbull.app"

      - name: Run canary Maestro flow
        id: maestro
        run: |
          maestro test \
            -e EMAIL="$CANARY_EMAIL" \
            -e PASSWORD="$CANARY_PASSWORD" \
            .maestro/99-canary.yaml

      - name: Assert PostHog event chain (24h window, ±10% tolerance)
        if: always()
        run: node .github/scripts/canary-posthog-assert.mjs

      - name: Open GitHub issue on divergence
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Canary Walker divergence — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              "The weekly Canary Walker (`.github/workflows/canary-walker.yml`) failed.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Possible causes:",
              "- Onboarding UI change broke a Maestro selector (run `node scripts/check-maestro-ids.mjs` locally)",
              "- PostHog event pipeline drift (`intake_started → onboarding_setup_continue`)",
              "- Build/install failure (xcodebuild scheme or derivedDataPath drift)",
              "",
              "Triage per plan-024 §Canary Walker CI."
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["canary", "on-call"],
            });
